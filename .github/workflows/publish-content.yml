name: Publish Content

on:
  issues:
    types: [opened, labeled, reopened]
  push:
    branches: [master]
    paths: ['.github/ISSUE_TEMPLATE/**']

jobs:
  setup-labels:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'post', color: '0e8a16', description: 'Blog post' },
              { name: 'photo', color: '1d76db', description: 'Photo' },
              { name: 'gallery', color: 'd93f0b', description: 'Photo gallery' },
              { name: 'delete', color: 'b60205', description: 'Delete content' },
            ];
            for (const l of labels) {
              try { await github.rest.issues.createLabel({ ...context.repo, ...l }); }
              catch {}
            }

  publish:
    if: >-
      github.event_name == 'issues' && (
        contains(github.event.issue.labels.*.name, 'post') ||
        contains(github.event.issue.labels.*.name, 'photo') ||
        contains(github.event.issue.labels.*.name, 'gallery') ||
        contains(github.event.issue.labels.*.name, 'delete')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;

            const allowed = ['OWNER', 'COLLABORATOR', 'MEMBER'];
            if (!allowed.includes(issue.author_association)) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number,
                body: 'Only the repo owner or collaborators can manage content.',
              });
              if (issue.state === 'open') {
                await github.rest.issues.update({
                  ...context.repo, issue_number: issue.number, state: 'closed',
                });
              }
              return;
            }

            const labels = issue.labels.map(l => l.name);
            const isDelete = labels.includes('delete');

            if (action === 'labeled' && !isDelete) return;

            const title = issue.title.trim();
            const body = issue.body || '';

            const isPost = labels.includes('post');
            const isPhoto = labels.includes('photo');
            const isGallery = labels.includes('gallery');

            const slug = title.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 60);
            const dir = isPost ? 'posts' : isPhoto ? 'photos' : isGallery ? 'gallery' : null;
            const routePrefix = isPost ? 'blog' : isPhoto ? 'photo' : 'gallery';
            const committer = {
              name: 'github-actions[bot]',
              email: '41898282+github-actions[bot]@users.noreply.github.com',
            };

            // ---- DELETE ----
            if (isDelete) {
              if (!dir) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number,
                  body: 'Add a content type label (`post`, `photo`, or `gallery`) so I know which file to delete.',
                });
                return;
              }
              const filePath = `src/content/${dir}/${slug}.md`;
              try {
                const { data } = await github.rest.repos.getContent({
                  ...context.repo, path: filePath, ref: 'master',
                });
                await github.rest.repos.deleteFile({
                  ...context.repo, path: filePath, branch: 'master',
                  message: `delete: ${title}`, sha: data.sha, committer,
                });
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    ...context.repo, workflow_id: 'deploy.yml', ref: 'master',
                  });
                } catch {}
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number,
                  body: `Deleted \`${filePath}\` — site will rebuild in ~2 minutes.`,
                });
              } catch {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number,
                  body: `File \`src/content/${dir}/${slug}.md\` not found — nothing to delete.`,
                });
              }
              if (issue.state === 'open') {
                await github.rest.issues.update({
                  ...context.repo, issue_number: issue.number, state: 'closed',
                });
              }
              return;
            }

            // ---- CREATE / UPDATE — only for open issues ----
            if (issue.state !== 'open' || !dir) return;

            const today = new Date().toISOString().split('T')[0];

            function field(heading) {
              const esc = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const m = body.match(new RegExp(`### ${esc}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`));
              if (!m) return '';
              const v = m[1].trim();
              return v === '_No response_' ? '' : v;
            }

            function findImages(text) {
              const urls = [];
              const re = /!\[.*?\]\((https?:\/\/[^\s)]+)\)/g;
              let m;
              while ((m = re.exec(text)) !== null) urls.push(m[1]);
              return [...new Set(urls)];
            }

            function esc(s) {
              return s.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
            }

            let filePath, fileContent;

            if (isPost) {
              const world = field('World').toLowerCase() || 'writing';
              const desc = field('Description') || title;
              const tags = field('Tags');
              const cover = field('Cover image URL');
              const content = field('Content') || body;

              let fm = '---\n';
              fm += `title: "${esc(title)}"\n`;
              fm += `description: "${esc(desc)}"\n`;
              fm += `date: ${today}\n`;
              fm += `world: ${world}\n`;
              if (tags) {
                const list = tags.split(',').map(t => t.trim()).filter(Boolean);
                fm += `tags: [${list.map(t => `"${esc(t)}"`).join(', ')}]\n`;
              }
              if (cover) fm += `cover: "${cover}"\n`;
              fm += '---\n\n' + content + '\n';
              fileContent = fm;
              filePath = `src/content/posts/${slug}.md`;

            } else if (isPhoto) {
              const photoText = field('Photo') || body;
              const imgs = findImages(photoText);
              if (!imgs.length) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number,
                  body: 'No image found. Attach or paste an image in the Photo field.',
                });
                return;
              }
              const caption = field('Caption') || title;
              const world = field('World').toLowerCase();
              const tags = field('Tags');
              let fm = '---\n';
              fm += `caption: "${esc(caption)}"\n`;
              fm += `date: ${today}\n`;
              fm += `image: "${imgs[0]}"\n`;
              if (world) fm += `world: ${world}\n`;
              if (tags) {
                const list = tags.split(',').map(t => t.trim()).filter(Boolean);
                fm += `tags: [${list.map(t => `"${esc(t)}"`).join(', ')}]\n`;
              }
              fm += '---\n';
              fileContent = fm;
              filePath = `src/content/photos/${slug}.md`;

            } else if (isGallery) {
              const location = field('Location') || '';
              const desc = field('Description');
              const tags = field('Tags');
              const photosText = field('Photos') || body;
              const imgs = findImages(photosText);
              if (!imgs.length) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number,
                  body: 'No images found. Attach or paste images in the Photos field.',
                });
                return;
              }
              const world = field('World').toLowerCase();
              let fm = '---\n';
              fm += `title: "${esc(title)}"\n`;
              if (desc) fm += `description: "${esc(desc)}"\n`;
              fm += `date: ${today}\n`;
              if (world) fm += `world: ${world}\n`;
              fm += `location: "${esc(location)}"\n`;
              fm += `cover: "${imgs[0]}"\n`;
              fm += 'photos:\n';
              imgs.forEach(url => { fm += `  - "${url}"\n`; });
              if (tags) {
                const list = tags.split(',').map(t => t.trim()).filter(Boolean);
                fm += `tags: [${list.map(t => `"${esc(t)}"`).join(', ')}]\n`;
              }
              fm += '---\n';
              fileContent = fm;
              filePath = `src/content/gallery/${slug}.md`;
            }

            // Commit the file (creates or updates)
            const params = {
              ...context.repo, path: filePath,
              content: Buffer.from(fileContent).toString('base64'),
              branch: 'master', committer,
            };
            let isUpdate = false;
            try {
              const { data } = await github.rest.repos.getContent({
                ...context.repo, path: filePath, ref: 'master',
              });
              params.sha = data.sha;
              isUpdate = true;
            } catch {}
            params.message = `${isUpdate ? 'update' : 'publish'}: ${title}`;
            await github.rest.repos.createOrUpdateFileContents(params);

            // Trigger deploy
            try {
              await github.rest.actions.createWorkflowDispatch({
                ...context.repo, workflow_id: 'deploy.yml', ref: 'master',
              });
            } catch {}

            // Close issue
            const verb = isUpdate ? 'Updated' : 'Published';
            await github.rest.issues.createComment({
              ...context.repo, issue_number: issue.number,
              body: `${verb} \`${filePath}\` — site will rebuild in ~2 minutes.\n\n→ /${routePrefix}/${slug}/`,
            });
            await github.rest.issues.update({
              ...context.repo, issue_number: issue.number, state: 'closed',
            });
