name: "New Photo"
description: "Publish a photo"
labels: ["photo"]
body:
  - type: textarea
    id: photo
    attributes:
      label: Photo
      description: "Paste or drag an image here"
    validations:
      required: true
  - type: textarea
    id: caption
    attributes:
      label: Caption
      description: "Longer description (issue title is used if blank)"
  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated"
      placeholder: "landscape, travel"
