name: "New Post"
description: "Publish a blog post"
labels: ["post"]
body:
  - type: dropdown
    id: world
    attributes:
      label: World
      options:
        - tech
        - film
        - music
        - writing
        - travel
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: Description
      description: "Short summary (auto-generated from title if blank)"
  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated"
      placeholder: "meta, coding"
  - type: input
    id: cover
    attributes:
      label: Cover image URL
  - type: textarea
    id: content
    attributes:
      label: Content
      description: "Write in Markdown. You can paste images."
    validations:
      required: true
