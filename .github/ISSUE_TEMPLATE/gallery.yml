name: "New Gallery"
description: "Publish a photo gallery"
labels: ["gallery"]
body:
  - type: input
    id: location
    attributes:
      label: Location
      placeholder: "Himalayas, India"
    validations:
      required: true
  - type: textarea
    id: photos
    attributes:
      label: Photos
      description: "Paste or drag images here. First image becomes the cover."
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: Description
  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated"
      placeholder: "travel, mountains"
